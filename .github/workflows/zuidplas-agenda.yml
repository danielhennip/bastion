name: Zuidplas agenda ophalen

on:
  # Notubiz blokkeert momenteel alle geautomatiseerde toegang via Cloudflare
  # (getest: HTTP 403 "you have been blocked" vanaf datacenter-IP's, ook met
  # een echte headless browser). Een vaak-draaiende scraper zou dus alleen
  # maar mislukken. Daarom alleen handmatig (workflow_dispatch) en één keer
  # per week — mocht de blokkade ooit versoepelen, dan pikt de agent het op.
  schedule:
    - cron: '0 6 * * 1'   # elke maandag 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: zuidplas-agenda
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installeer dependencies
        run: npm install --no-save

      - name: Installeer Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Haal Zuidplas-data op
        run: node scripts/fetch-zuidplas.mjs

      - name: Commit wijzigingen (indien aanwezig)
        run: |
          git config user.name "bastion-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data
          # --cached ziet ook nieuwe (untracked) bestanden die net ge-add zijn.
          if git diff --cached --quiet; then
            echo "Geen wijzigingen in data/, niets te committen."
          else
            git commit -m "chore: update Zuidplas agenda data"
            git push
          fi
